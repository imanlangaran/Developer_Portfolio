
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting ...</title>

    <script>
      const path = window.location.pathname;

      const repo = "/Developer_Portfolio";

      sessionStorage.redirect =
        path.replace(repo, "");

      window.location.replace(
        repo + "/"
      );
    </script>
  </head>
  <body></body>
</html>
